---
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  docs-and-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          npm install --global markdownlint-cli2 markdown-link-check
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Check required repository files
        run: bash scripts/check_repo_completeness.sh

      - name: Lint markdown
        run: |
          markdownlint-cli2 \
            README.md \
            CONTRIBUTING.md \
            SECURITY.md \
            CODE_OF_CONDUCT.md \
            ROADMAP.md \
            docs/architecture.md \
            docs/developer-guide.md \
            docs/adr/*.md

      - name: Check markdown links
        run: |
          for file in \
            README.md \
            CONTRIBUTING.md \
            SECURITY.md \
            CODE_OF_CONDUCT.md \
            ROADMAP.md \
            docs/architecture.md \
            docs/developer-guide.md \
            docs/adr/0001-system-boundaries.md \
            docs/adr/0002-brain-provider-layer.md \
            docs/adr/0003-ipc-wire-protocol.md
          do
            markdown-link-check --config .markdown-link-check.json "$file"
          done

      - name: Lint GitHub issue templates
        run: yamllint .github/ISSUE_TEMPLATE/*.yml .github/workflows/*.yml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/sysknife-shell
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_HOME: /home/runner/.cargo
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-features --locked -- -D warnings

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Test workspace
        run: cargo nextest run --workspace --locked
