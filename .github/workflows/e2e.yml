---
# End-to-end tests for LACS.
#
# Two jobs:
#
# 1. `scripts-lint`: always runs. ShellCheck on tests/e2e/, and compile
#    lacs-cli. Fast (~1 min), safe on every PR.
#
# 2. `container-smoke`: runs on workflow_dispatch or when a PR is labeled
#    `e2e`. Boots Ollama and the daemon directly in the runner, pulls a
#    small tool-capable model (llama3.2:3b), and runs the 14 read-only user
#    stories (1-7, 11-17). Slow (~10-20 min; most time is Ollama load +
#    inference; stories 12/15 also exercise query_job_history).
#
# The full high-fidelity flow — real Fedora Silverblue in QEMU/KVM via
# quickemu — is documented for local runs (see docs/contributing/testing.md).
# GitHub-hosted Linux runners do not support nested virtualization, so
# booting a Silverblue VM is not practical in this workflow.

name: e2e

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  scripts-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: ShellCheck story scripts, harness, and silverblue-vm helper
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: tests/e2e
          severity: warning

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build lacs-cli
        run: cargo build -p lacs-cli --locked

  container-smoke:
    # Opt-in: runs on manual dispatch or PRs labeled `e2e`.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'e2e'))

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            curl jq firewalld podman systemd-container \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:11434/api/tags > /dev/null; then
              echo "Ollama reachable after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Pull tool-capable model
        run: ollama pull llama3.2:3b

      - name: Build lacs-daemon and lacs
        run: |
          cargo build --release -p lacs-daemon -p lacs-cli --locked
          sudo cp target/release/lacs-daemon /usr/local/bin/
          sudo cp target/release/lacs /usr/local/bin/

      - name: Set up daemon socket directory
        run: |
          sudo mkdir -p /run/lacs
          sudo chmod 0755 /run/lacs

      - name: Start lacs-daemon
        env:
          LACS_LISTEN_URI: unix:///run/lacs/daemon.sock
          LACS_DATABASE_PATH: /tmp/lacs-daemon.sqlite
        run: |
          sudo -E nohup lacs-daemon > /tmp/lacs-daemon.log 2>&1 &
          for i in $(seq 1 30); do
            if [ -S /run/lacs/daemon.sock ]; then
              echo "Daemon socket ready after ${i}s"
              break
            fi
            sleep 1
          done
          sudo chmod 0666 /run/lacs/daemon.sock

      - name: Pre-seed test user and SSH key
        run: |
          sudo useradd -m -s /bin/bash lacsdev || true
          sudo -u lacsdev mkdir -p /home/lacsdev/.ssh
          # Test-only canned public key, not a real secret
          echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFakeTestKeyForE2ETesting testkey@example" \
            | sudo tee /home/lacsdev/.ssh/authorized_keys
          sudo chown -R lacsdev:lacsdev /home/lacsdev/.ssh
          sudo chmod 700 /home/lacsdev/.ssh
          sudo chmod 600 /home/lacsdev/.ssh/authorized_keys

      - name: Start firewalld
        run: |
          sudo systemctl start firewalld || true
          sudo firewall-cmd --state || true
          sudo firewall-cmd --add-service=ssh --permanent || true
          sudo firewall-cmd --reload || true

      - name: Write ready marker
        run: |
          sudo mkdir -p /var/lib/lacs-e2e
          sudo touch /var/lib/lacs-e2e/ready

      - name: Run read-only stories (1-7)
        env:
          LACS_LISTEN_URI: unix:///run/lacs/daemon.sock
          LACS_LLM_PROVIDER: ollama
          LACS_LLM_MODEL: llama3.2:3b
          LACS_OLLAMA_URL: http://127.0.0.1:11434
          LACS_STORY_TIMEOUT: "180"
        run: bash tests/e2e/run-stories.sh

      - name: Dump daemon log on failure
        if: failure()
        run: |
          echo "=== lacs-daemon log ==="
          sudo cat /tmp/lacs-daemon.log || true
          echo "=== ollama log ==="
          cat /tmp/ollama.log || true

      - name: Upload story logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-story-logs
          path: tests/e2e/logs/
          retention-days: 7
