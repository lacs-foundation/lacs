---
# Release workflow for SysKnife.
#
# Triggered by pushing a version tag (v*.*.*).
# Builds sysknife and sysknife-daemon for Linux x86_64 and aarch64,
# then creates a GitHub release with the binaries as assets.
#
# Binary naming convention:
#   sysknife-v0.1.0-linux-x86_64
#   sysknife-daemon-v0.1.0-linux-x86_64
#   sysknife-v0.1.0-linux-aarch64
#   sysknife-daemon-v0.1.0-linux-aarch64

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: |
          cargo build --release --locked \
            -p sysknife-cli \
            -p sysknife-daemon

      - name: Rename and stage binaries
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          cp target/release/sysknife        "sysknife-${VERSION}-linux-${ARCH}"
          cp target/release/sysknife-daemon "sysknife-daemon-${VERSION}-linux-${ARCH}"
          chmod +x "sysknife-${VERSION}-linux-${ARCH}"
          chmod +x "sysknife-daemon-${VERSION}-linux-${ARCH}"
          sha256sum \
            "sysknife-${VERSION}-linux-${ARCH}" \
            "sysknife-daemon-${VERSION}-linux-${ARCH}" \
            > "sha256sums-linux-${ARCH}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.arch }}
          path: |
            sysknife-*-linux-${{ matrix.arch }}
            sysknife-daemon-*-linux-${{ matrix.arch }}
            sha256sums-linux-${{ matrix.arch }}.txt
          retention-days: 1

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: List dist contents
        run: ls -lh dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "${VERSION}" \
            --title "SysKnife ${VERSION}" \
            --notes "## SysKnife ${VERSION}

          ### Installation

          **Linux x86_64:**
          \`\`\`bash
          curl -Lo sysknife https://github.com/${REPO}/releases/download/${VERSION}/sysknife-${VERSION}-linux-x86_64
          curl -Lo sysknife-daemon https://github.com/${REPO}/releases/download/${VERSION}/sysknife-daemon-${VERSION}-linux-x86_64
          chmod +x sysknife sysknife-daemon
          sudo mv sysknife sysknife-daemon /usr/local/bin/
          \`\`\`

          **Linux aarch64:**
          \`\`\`bash
          curl -Lo sysknife https://github.com/${REPO}/releases/download/${VERSION}/sysknife-${VERSION}-linux-aarch64
          curl -Lo sysknife-daemon https://github.com/${REPO}/releases/download/${VERSION}/sysknife-daemon-${VERSION}-linux-aarch64
          chmod +x sysknife sysknife-daemon
          sudo mv sysknife sysknife-daemon /usr/local/bin/
          \`\`\`

          After installing the binaries, run \`sudo make install\` from the repo to set up the systemd unit, polkit rules, and sysusers configuration." \
            dist/sysknife-*-linux-x86_64 \
            dist/sysknife-daemon-*-linux-x86_64 \
            dist/sysknife-*-linux-aarch64 \
            dist/sysknife-daemon-*-linux-aarch64 \
            dist/sha256sums-*.txt
