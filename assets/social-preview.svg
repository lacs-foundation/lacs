<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="SysKnife social preview">
  <title>SysKnife — AI-managed Linux. Plan. Approve. Audit.</title>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#1B232B"/>
    </linearGradient>
    <linearGradient id="bladeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB45A"/>
      <stop offset="100%" stop-color="#FF6B1A"/>
    </linearGradient>
    <linearGradient id="coatGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB45A"/>
      <stop offset="100%" stop-color="#E8943A"/>
    </linearGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Mascot, scaled and translated to fit the left half -->
  <g transform="translate(80 80) scale(1.875)">
    <!-- Body (sit posture) -->
    <ellipse cx="128" cy="170" rx="70" ry="58" fill="url(#coatGrad)"/>
    <!-- Saddle / dark mask over body -->
    <path d="M 76 134
             Q 88 110 128 108
             Q 168 110 180 134
             Q 178 158 162 174
             Q 128 184 94 174
             Q 78 158 76 134 Z"
          fill="#2B3440"/>
    <!-- Head -->
    <ellipse cx="128" cy="100" rx="44" ry="42" fill="url(#coatGrad)"/>
    <!-- Dark mask over face -->
    <path d="M 100 92
             Q 128 86 156 92
             Q 152 116 128 122
             Q 104 116 100 92 Z"
          fill="#2B3440"/>
    <!-- Snout / muzzle -->
    <ellipse cx="128" cy="118" rx="12" ry="9" fill="#FFB45A"/>
    <ellipse cx="128" cy="116" rx="4" ry="3" fill="#0F1419"/>
    <!-- Eyes -->
    <circle cx="116" cy="100" r="3" fill="#0F1419"/>
    <circle cx="140" cy="100" r="3" fill="#0F1419"/>
    <circle cx="117" cy="99" r="1" fill="#FFFFFF"/>
    <circle cx="141" cy="99" r="1" fill="#FFFFFF"/>
    <!-- Ears (alert, erect, classic GSD triangle) -->
    <path d="M 90 70 L 100 100 L 80 102 Z" fill="url(#coatGrad)"/>
    <path d="M 90 70 L 96 90 L 84 92 Z" fill="#2B3440"/>
    <path d="M 166 70 L 156 100 L 176 102 Z" fill="url(#coatGrad)"/>
    <path d="M 166 70 L 160 90 L 172 92 Z" fill="#2B3440"/>
    <!-- Front legs -->
    <ellipse cx="106" cy="208" rx="12" ry="22" fill="url(#coatGrad)"/>
    <ellipse cx="150" cy="208" rx="12" ry="22" fill="url(#coatGrad)"/>
    <!-- Collar -->
    <ellipse cx="128" cy="148" rx="34" ry="6" fill="#FF6B1A"/>
    <!-- Tag — mint shield with `>` prompt -->
    <path d="M 121 152 L 135 152 L 135 164 L 128 170 L 121 164 Z" fill="#5EEAD4"/>
    <text x="128" y="164" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="800" fill="#0F1419">&gt;</text>
  </g>

  <!-- Wordmark, right side -->
  <g transform="translate(580 240)">
    <text font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif"
          font-size="120" font-weight="800" letter-spacing="-3" fill="#FFFFFF">
      Sys<tspan fill="#FF6B1A">Knife</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <g transform="translate(584 320)">
    <text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="28" fill="#5EEAD4">
      &gt; AI-managed Linux. Plan. Approve. Audit.
    </text>
  </g>

  <!-- Distro stickers row -->
  <g transform="translate(584 380)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600">
    <rect x="0"   y="0" width="120" height="36" rx="6" fill="#294172"/>
    <text x="60"  y="24" text-anchor="middle" fill="#FFFFFF">Fedora 41+</text>
    <rect x="132" y="0" width="124" height="36" rx="6" fill="#E95420"/>
    <text x="194" y="24" text-anchor="middle" fill="#FFFFFF">Ubuntu 22-26.04</text>
    <rect x="268" y="0" width="84"  height="36" rx="6" fill="#FF6B1A"/>
    <text x="310" y="24" text-anchor="middle" fill="#FFFFFF">MIT</text>
  </g>

  <!-- Footer subtle -->
  <g transform="translate(584 460)">
    <text font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#94A3B8">
      github.com/lacs-foundation/sysknife
    </text>
  </g>
</svg>
