# ubuntu-vm.conf — defaults for the Ubuntu 24.04 E2E VM.
# Sourced by ubuntu-vm.sh. Override by setting env vars before calling
# ubuntu-vm.sh, or by editing this file in your worktree.

# RAM allocated to the guest. 4 GB is enough for apt builds + sysknife.
# Bump to 8G if you plan to run a local LLM inside the VM.
UBUNTU_VM_MEM="${UBUNTU_VM_MEM:-4096}"

# Virtual CPU count. 2 keeps the host responsive; 4 speeds up cargo.
UBUNTU_VM_CPUS="${UBUNTU_VM_CPUS:-2}"

# qcow2 overlay size (virtual disk visible to the guest).
UBUNTU_VM_DISK="${UBUNTU_VM_DISK:-20G}"

# Host SSH port forwarded to guest :22. Use a port that does not clash
# with atomic-vm.sh (which uses 22220-22229).
UBUNTU_VM_SSH_PORT="${UBUNTU_VM_SSH_PORT:-2223}"

# Guest username — matches the default user baked into Ubuntu cloud images.
UBUNTU_VM_USER="${UBUNTU_VM_USER:-ubuntu}"

# Where to cache the base cloud image.
UBUNTU_VM_IMAGE_CACHE="${UBUNTU_VM_IMAGE_CACHE:-$HOME/.cache/sysknife-vms}"

# Image filename inside the cache dir.
UBUNTU_VM_BASE_IMAGE="${UBUNTU_VM_BASE_IMAGE:-noble-server-cloudimg-amd64.img}"

# Where to store the overlay and VM runtime files (relative to repo root).
UBUNTU_VM_DIR="${UBUNTU_VM_DIR:-tests/e2e/ubuntu-vm}"
