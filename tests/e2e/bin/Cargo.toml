[package]
name = "lacs-test-cli"
version = "0.1.0"
edition = "2021"
publish = false
description = "E2E test CLI: accepts an intent on stdin, produces a plan as JSON on stdout."

[[bin]]
name = "lacs-test-cli"
path = "src/main.rs"

[dependencies]
lacs-brain = { path = "../../../crates/lacs-brain" }
lacs-core = { path = "../../../crates/lacs-core" }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
