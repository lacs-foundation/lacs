# tmpfiles.d(5) — create runtime and state directories for lacs.
#
# Deploy to: /usr/lib/tmpfiles.d/lacs.conf
# Applied by: systemd-tmpfiles-setup (boot) and systemd-tmpfiles-clean.
#
# Columns: Type  Path              Mode  User  Group  Age  Argument
#
# /run/lacs      — volatile runtime dir (wiped at reboot); holds daemon.sock.
# /var/lib/lacs  — persistent state dir; holds daemon.sqlite.

d /run/lacs     0750 lacs lacs -
d /var/lib/lacs 0700 lacs lacs -
