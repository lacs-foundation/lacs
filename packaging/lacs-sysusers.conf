# sysusers.d(5) — create the lacs system user, socket group, and role groups.
#
# Deploy to: /usr/lib/sysusers.d/lacs.conf
# Applied by: systemd-sysusers (runs at boot and after package install).
#
# The lacs system user (daemon identity):
#   - No login shell — daemon-only account.
#   - No home directory — state lives in /var/lib/lacs.
#   - Owns the socket directory /run/lacs and the socket itself.
u lacs - "LACS privileged daemon" /var/lib/lacs /usr/sbin/nologin

# Socket-gating group — controls access to /run/lacs/.
#
# The daemon socket directory /run/lacs/ is owned lacs:lacs 0750.
# A user must be in the lacs group to reach the socket at all; without it
# the connection is refused before any role check happens.
#
# This group is separate from the role groups so that socket-level access
# and capability-level access can be managed independently.
g lacs - -

# Role groups — map to CallerRole in crates/lacs-daemon/src/auth.rs.
#
# To grant a user access to LACS, add them to the lacs group (required to
# reach the socket) and to exactly one role group (determines what they
# can do once connected):
#
#   sudo usermod -aG lacs,lacs-dev alice    # read + medium-risk mutations
#   sudo usermod -aG lacs,lacs-admin alice  # full access incl. rpm-ostree
#
# Role hierarchy (higher role wins when a user is in multiple groups):
#
#   lacs-observer  — read-only queries (GetDiskUsage, ListServices, …)
#   lacs-dev       — observer + medium-risk mutations (services, containers, SSH keys, …)
#   lacs-admin     — dev + high-risk mutations (rpm-ostree, reboot, kernel args, …)
#   lacs-boot      — reserved for boot-time automation; grants all actions
#
# Members of the wheel group are treated as lacs-admin automatically.
# No explicit lacs-admin membership is required for wheel users.
g lacs-observer - -
g lacs-dev      - -
g lacs-admin    - -
g lacs-boot     - -
