# sysusers.d(5) — create the lacs system user and group.
#
# Deploy to: /usr/lib/sysusers.d/lacs.conf
# Applied by: systemd-sysusers (runs at boot and after package install).
#
# The lacs user:
#   - Has no login shell (/usr/sbin/nologin) — daemon-only account.
#   - Has no home directory (-) — state lives in /var/lib/lacs.
#   - Is a member of its own group (lacs) — the Unix socket is
#     group-readable by lacs only; shell users in the lacs group
#     gain access via polkit, not direct socket ownership.
u lacs - "LACS privileged daemon" /var/lib/lacs /usr/sbin/nologin
